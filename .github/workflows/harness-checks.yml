name: Harness Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  harness-checks:
    name: harness-checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run harness validation
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/validate-harness.ps1
